    </radialGradient>
    <radialGradient id="g5hub" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#a0a8c0"/><stop offset="1" stop-color="#606880"/></radialGradient>
    <filter id="g5glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="g5ledglow"><feGaussianBlur stdDeviation="3"/></filter>
