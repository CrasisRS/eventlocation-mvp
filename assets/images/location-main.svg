<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Flexible event hall</title>
  <desc id="desc">Modern event location with transformable lighting for wedding, party, and business events.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7e9d2"/>
      <stop offset="1" stop-color="#d8f3ef"/>
    </linearGradient>
    <linearGradient id="ceiling" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#27384f"/>
      <stop offset="1" stop-color="#1e2940"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d7c3a3"/>
      <stop offset="1" stop-color="#b39170"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <rect x="80" y="70" width="1040" height="620" rx="36" fill="#fff" stroke="#d8d8d8"/>
  <rect x="120" y="100" width="960" height="180" rx="18" fill="url(#ceiling)"/>
  <rect x="120" y="280" width="960" height="380" rx="18" fill="url(#floor)"/>

  <rect x="180" y="140" width="190" height="36" rx="18" fill="#f5b667"/>
  <rect x="390" y="140" width="190" height="36" rx="18" fill="#7dd8cb"/>
  <rect x="600" y="140" width="190" height="36" rx="18" fill="#ff8b6f"/>
  <rect x="810" y="140" width="190" height="36" rx="18" fill="#f2e8ff"/>

  <circle cx="280" cy="360" r="78" fill="#fff4e5" stroke="#d4b898"/>
  <circle cx="600" cy="360" r="78" fill="#fff4e5" stroke="#d4b898"/>
  <circle cx="920" cy="360" r="78" fill="#fff4e5" stroke="#d4b898"/>
  <rect x="220" y="400" width="120" height="26" rx="13" fill="#cf6a57"/>
  <rect x="540" y="400" width="120" height="26" rx="13" fill="#2d8a83"/>
  <rect x="860" y="400" width="120" height="26" rx="13" fill="#3c4f8f"/>

  <rect x="170" y="505" width="860" height="125" rx="24" fill="#fff" stroke="#d0d0d0"/>
  <rect x="210" y="540" width="190" height="52" rx="12" fill="#f7d8cf"/>
  <rect x="430" y="540" width="190" height="52" rx="12" fill="#d0f2ec"/>
  <rect x="650" y="540" width="190" height="52" rx="12" fill="#e6dcfb"/>
</svg>
